{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    {% if registration %}
        <h2>Edit Registration</h2>
    {% else %}
        <h2>Create Registration</h2>
    {% endif %}

    <div class="card">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button
                    type="submit"
                    class="btn btn-success">

                    Save

                </button>

                <a href="{% url 'registration_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
