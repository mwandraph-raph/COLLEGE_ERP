{% extends "base.html" %}

{% block content %}

{% if student %}
<h2>Edit Student</h2>
{% else %}
<h2>Register Student</h2>
{% endif %}
<form method="post">
    {% csrf_token %}

    {{ form.as_p }}
    <button type="submit">
        Save Student
    </button>
</form>
<p>
    <a href="{% url 'student_list' %}">
        Back to Student List
    </a>
</p>

{% endblock %}
