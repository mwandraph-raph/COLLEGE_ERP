{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">

            <h5 class="mb-0">
                {{ title }}
            </h5>

        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Lecturer
                        </label>
                        {{ form.lecturer }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Unit
                        </label>
                        {{ form.unit }}
                    </div>

                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Academic Year
                        </label>
                        {{ form.academic_year }}
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            Semester
                        </label>
                        {{ form.semester }}
                    </div>

                </div>

                <button type="submit"
                        class="btn btn-primary">
                    Save Assignment
                </button>

                <a href="{% url 'lecturer_assignment_list' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
