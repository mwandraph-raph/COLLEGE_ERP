{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Semester Form</h2>

    <div class="card">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit"
                        class="btn btn-success">
                    Save
                </button>

                <a href="{% url 'semester_list' %}"
                   class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
