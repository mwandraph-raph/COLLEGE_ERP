{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card border-danger">

        <div class="card-header bg-danger text-white">

            Delete Unit

        </div>

        <div class="card-body">

            <p>

                Are you sure you want to delete:

                <strong>

                    {{ unit.unit_code }}

                    -

                    {{ unit.unit_name }}

                </strong>

            </p>

            <form method="post">

                {% csrf_token %}

                <button
                    type="submit"
                    class="btn btn-danger">

                    Delete

                </button>

                <a href="{% url 'unit_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
