{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    {% if unit %}
        <h2>Edit Unit</h2>
    {% else %}
        <h2>Create Unit</h2>
    {% endif %}

    <div class="card">

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Unit Code
                    </label>

                    {{ form.unit_code }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Unit Name
                    </label>

                    {{ form.unit_name }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Course
                    </label>

                    {{ form.course }}

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Credit Hours
                    </label>

                    {{ form.credit_hours }}

                </div>

                <button
                    type="submit"
                    class="btn btn-success">

                    Save

                </button>

                <a href="{% url 'unit_list' %}"
                   class="btn btn-secondary">

                    Cancel

                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
