{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-6">

        <div class="card shadow border-danger">

            <div class="card-header bg-danger text-white">

                <h3 class="mb-0">

                    Delete User

                </h3>

            </div>

            <div class="card-body">

                <p class="fs-5">

                    Are you sure you want to delete:

                </p>

                <h4>

                    {{ object.get_full_name|default:object.username }}

                </h4>

                <p>

                    Username:
                    <strong>{{ object.username }}</strong>

                </p>

                <p class="text-danger">

                    This action cannot be undone.

                </p>

            </div>

            <div class="card-footer">

                <form method="post">

                    {% csrf_token %}

                    <a
                        href="{% url 'accounts:user_list' %}"
                        class="btn btn-secondary">

                        Cancel

                    </a>

                    <button
                        type="submit"
                        class="btn btn-danger">

                        Delete User

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
