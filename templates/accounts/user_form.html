{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        {% if object %}

            <h3 class="mb-0">

                Edit User

            </h3>

        {% else %}

            <h3 class="mb-0">

                Create User

            </h3>

        {% endif %}

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                        <div class="text-danger mt-1">

                            {{ field.errors }}

                        </div>

                    {% endif %}

                </div>

            {% endfor %}

            <div class="d-flex justify-content-between">

                <a
                    href="{% url 'accounts:user_list' %}"
                    class="btn btn-secondary">

                    Back

                </a>

                <button
                    type="submit"
                    class="btn btn-primary">

                    Save User

                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
