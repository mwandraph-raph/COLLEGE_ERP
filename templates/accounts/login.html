{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5">

        <div class="card shadow">

            <div class="card-header bg-primary text-white">

                <h3 class="mb-0">

                    College ERP Login

                </h3>

            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input
                            type="text"
                            name="username"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input
                            type="password"
                            name="password"
                            class="form-control"
                            required
                        >

                    </div>

                    <div class="d-grid">

                        <button
                            class="btn btn-primary"
                            type="submit">

                            Login

                        </button>

                    </div>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
