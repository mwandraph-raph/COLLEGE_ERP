{% extends "base.html" %}

{% block content %}

<div class="card shadow">

    <div class="card-header bg-primary text-white">

        {% if object %}

            <h3>Edit Role</h3>

        {% else %}

            <h3>Create Role</h3>

        {% endif %}

    </div>

    <div class="card-body">

        <form method="post">

            {% csrf_token %}

            {% for field in form %}

                <div class="mb-3">

                    <label class="form-label">

                        {{ field.label }}

                    </label>

                    {{ field }}

                    {% if field.errors %}

                        <div class="text-danger">

                            {{ field.errors }}

                        </div>

                    {% endif %}

                </div>

            {% endfor %}

            <a
                href="{% url 'accounts:group_list' %}"
                class="btn btn-secondary">

                Back

            </a>

            <button
                class="btn btn-primary">

                Save Role

            </button>

        </form>

    </div>

</div>

{% endblock %}
