{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-lg-5 col-md-7">

        <div class="card shadow">

            <div class="card-header bg-primary text-white text-center">

                <h3>College ERP Login</h3>

            </div>

            <div class="card-body">

                {% if form.errors %}

                    <div class="alert alert-danger">

                        Invalid username or password.

                    </div>

                {% endif %}

                <form method="post">

                    {% csrf_token %}

                    <div class="mb-3">

                        <label class="form-label">

                            Username

                        </label>

                        <input

                            type="text"

                            name="username"

                            class="form-control"

                            required

                        >

                    </div>

                    <div class="mb-3">

                        <label class="form-label">

                            Password

                        </label>

                        <input

                            type="password"

                            name="password"

                            class="form-control"

                            required

                        >

                    </div>

                    <button

                        class="btn btn-primary w-100"

                        type="submit">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
