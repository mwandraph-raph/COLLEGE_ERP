{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <h2>Delete Fee Category</h2>

    <p>

        Are you sure you want to delete:

        <strong>{{ category }}</strong> ?

    </p>

    <form method="post">

        {% csrf_token %}

        <button type="submit"
                class="btn btn-danger">

            Delete

        </button>

        <a href="{% url 'finance:fee_category_list' %}"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
